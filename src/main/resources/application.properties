spring.application.name=sample-login
spring.threads.virtual.enabled=true

# these don't really matter because of DCR, but are needed anyway
spring.security.oauth2.authorizationserver.client.default-client.token.access-token-time-to-live=365d
spring.security.oauth2.authorizationserver.client.default-client.registration.client-id=default-client
spring.security.oauth2.authorizationserver.client.default-client.registration.client-secret={noop}default-secret
spring.security.oauth2.authorizationserver.client.default-client.registration.client-authentication-methods[0]=none
spring.security.oauth2.authorizationserver.client.default-client.registration.authorization-grant-types[0]=authorization_code
spring.security.oauth2.authorizationserver.client.default-client.registration.redirect-uris[0]=/login/oauth2/code/authserver

spring.security.oauth2.authorizationserver.client.spring.registration.client-id=spring
spring.security.oauth2.authorizationserver.client.spring.registration.client-secret={noop}spring
spring.security.oauth2.authorizationserver.client.spring.registration.client-authentication-methods[0]=client_secret_basic
spring.security.oauth2.authorizationserver.client.spring.registration.authorization-grant-types[0]=authorization_code
spring.security.oauth2.authorizationserver.client.spring.registration.authorization-grant-types[1]=client_credentials
spring.security.oauth2.authorizationserver.client.spring.registration.authorization-grant-types[2]=refresh_token
spring.security.oauth2.authorizationserver.client.spring.registration.authorization-grant-types[3]=urn:ietf:params:oauth:grant-type:device_code
spring.security.oauth2.authorizationserver.client.spring.registration.redirect-uris[0]=http://127.0.0.1:8081/login/oauth2/code/spring
spring.security.oauth2.authorizationserver.client.spring.registration.scopes[0]=openid
spring.security.oauth2.authorizationserver.client.spring.registration.scopes[1]=profile
spring.security.oauth2.authorizationserver.client.spring.registration.scopes[2]=message

# this is needed when running behind a reverse proxy
#server.forward-headers-strategy=framework

server.port=${PORT:9000}
server.servlet.session.cookie.name=MCP_AUTHORIZATION_SERVER_SESSIONID

gg.jte.usePrecompiledTemplates=true
